        type: boolean
      max_total_quota:
        type: integer
      price_after_discount:
        type: number
      price_before_discount:
        type: number
      product_name:
        type: string
      target_id:
        type: string
      total_discount:
        type: number
    required:
    - discount_id
    - is_active
    - target_id
    type: object
  reqmodel.CreatePost:
    properties:
      content:
        type: string
      is_active:
        type: boolean
      title:
        type: string
    required:
    - content
    - is_active
    - title
    type: object
  reqmodel.UpdateDiscount:
    properties:
      end_date:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      start_date:
        type: string
      type:
        type: string
      value:
        type: number
    type: object
  reqmodel.UpdateDiscountProductTarget:
    properties:
      discount_id:
        type: string
      is_active:
        type: boolean
      max_total_quota:
        type: integer
      price_after_discount:
        type: number
      price_before_discount:
        type: number
